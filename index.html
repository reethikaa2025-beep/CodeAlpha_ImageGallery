<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="gallery">

<img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(0)">
<img src="https://picsum.photos/id/1016/600/400" onclick="openLightbox(1)">
<img src="https://picsum.photos/id/1025/600/400" onclick="openLightbox(2)">
<img src="https://picsum.photos/id/1035/600/400" onclick="openLightbox(3)">
<img src="https://picsum.photos/id/1043/600/400" onclick="openLightbox(4)">
<img src="https://picsum.photos/id/1050/600/400" onclick="openLightbox(5)">

</div>

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="previousImage()">❮</button>

<img id="lightboxImage">

<button class="next" onclick="nextImage()">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
